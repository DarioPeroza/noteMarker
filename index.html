<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.0.0-beta2-dist/css/bootstrap.min.css">
    <title>Note Maker</title>
</head>
<body class="d-flex">
    <div 
        class="d-flex align-items-center col-md-6 align-middle" 
        style="height: 100vh;">
        <div 
            class="row container m-2">
            <form 
                id="task-form" 
                class="p-3 bg-light rounded form-text border border-secondary"
                >
                <div class="mb-3">
                    <input 
                        type="text" 
                        id="task-title" 
                        placeholder="Task title" 
                        class="form-control"
                        autofocus
                    >
                </div>
                <div class="mb-3">
                    <textarea 
                        id="task-description"
                        rows="3"
                        placeholder="Task description" 
                        class="form-control"
                    ></textarea>
                </div>
                <div class="row">
                    <div class="d-flex">
                        <button 
                            id="saveButton" 
                            class="btn btn-primary flex-fill border border-2 border-light">Save
                        </button>
                        <button 
                            id="deleteButton" 
                            class="btn btn-secondary flex-fill border border-2 border-light">Delete
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <div class="container col-md-6 p-5" id="tasks-container" style="max-height: 100vh; overflow-y: auto;">

    </div>
